name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-linux:
    name: Native Linux
    runs-on: ubuntu-26.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg
          key: native-linux-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'ports/**') }}
          restore-keys: |
            native-linux-vcpkg-

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt update
          sudo apt install -y \
            autoconf \
            autoconf-archive \
            automake \
            build-essential \
            cmake \
            curl \
            g++-16 \
            gawk \
            gcc-16 \
            gettext \
            git \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libice-dev \
            libltdl-dev \
            libsm-dev \
            libtool \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxft-dev \
            libxinerama-dev \
            libxrender-dev \
            ninja-build \
            pkg-config \
            python3 \
            tar \
            unzip \
            zip

      - name: Build and install
        run: |
          set -euo pipefail
          python3 ./build.py --build-dir "$RUNNER_TEMP/b_mir2x_linux" --c-compiler gcc-16 --cxx-compiler g++-16 --parallel 4

      - name: Verify Linux linkage
        run: |
          set -euo pipefail

          install_dir="$RUNNER_TEMP/b_mir2x_linux/install"
          mapfile -t exe_list < <(find "$install_dir" -type f -perm -111 | sort)

          if [ "${#exe_list[@]}" -eq 0 ]; then
            echo "No installed executables found" >&2
            exit 1
          fi

          for exe in "${exe_list[@]}"; do
            if ! file "$exe" | grep -q 'ELF'; then
              continue
            fi

            echo "== ldd $exe =="
            ldd "$exe" || true

            echo "== readelf $exe =="
            readelf -d "$exe" | grep NEEDED || true
          done

      - name: Package Linux install tree
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/b_mir2x_linux/install"
          zip -r "$RUNNER_TEMP/mir2x-linux-latest-build.zip" .

      - name: Upload Linux package
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: mir2x-linux-package
          path: ${{ runner.temp }}/mir2x-linux-latest-build.zip
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  mingw-ucrt64:
    name: MinGW UCRT64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg
          key: mingw-ucrt64-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'ports/**') }}
          restore-keys: |
            mingw-ucrt64-vcpkg-

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            zip
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-python

      - name: Build and install
        env:
          VCPKG_DEFAULT_TRIPLET: x64-mingw-static
          VCPKG_DEFAULT_HOST_TRIPLET: x64-mingw-static
        run: |
          python3 ./build.py --build-dir "$RUNNER_TEMP/b_mir2x_windows" --parallel 4

      - name: Verify MinGW linkage
        run: |
          set -euo pipefail

          install_dir="$RUNNER_TEMP/b_mir2x_windows/install"
          mapfile -t exe_list < <(find "$install_dir" -type f -name '*.exe' | sort)

          if [ "${#exe_list[@]}" -eq 0 ]; then
            echo "No installed executables found" >&2
            exit 1
          fi

          for exe in "${exe_list[@]}"; do
            echo "== ldd $exe =="
            ldd "$exe" || true

            echo "== objdump $exe =="
            objdump -p "$exe" | grep 'DLL Name' || true
          done

      - name: Package MinGW install tree
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/b_mir2x_windows/install"
          zip -r "$RUNNER_TEMP/mir2x-windows-latest-build.zip" .

      - name: Upload MinGW package
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: mir2x-windows-package
          path: ${{ runner.temp }}/mir2x-windows-latest-build.zip
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  release-latest:
    name: Publish latest release
    runs-on: ubuntu-26.04
    needs: [native-linux, mingw-ucrt64]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    concurrency:
      group: latest-release
      cancel-in-progress: true

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: mir2x-*-package
          path: dist
          merge-multiple: true

      - name: Replace latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release delete latest --cleanup-tag -y || true
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/latest" || true

          gh release create latest \
            dist/mir2x-linux-latest-build.zip \
            dist/mir2x-windows-latest-build.zip \
            --target "$GITHUB_SHA" \
            --title "Latest build" \
            --notes "Automated latest build for $GITHUB_SHA" \
            --latest

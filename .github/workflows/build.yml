name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-linux:
    name: Native Linux
    runs-on: ubuntu-26.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg
          key: native-linux-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'ports/**') }}
          restore-keys: |
            native-linux-vcpkg-

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt update
          sudo apt install -y \
            autoconf \
            autoconf-archive \
            automake \
            build-essential \
            cmake \
            curl \
            g++-16 \
            gawk \
            gcc-16 \
            gettext \
            git \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libice-dev \
            libltdl-dev \
            libsm-dev \
            libtool \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxft-dev \
            libxinerama-dev \
            libxrender-dev \
            ninja-build \
            pkg-config \
            python3 \
            tar \
            unzip \
            zip

      - name: Build and install
        run: |
          set -euo pipefail
          python3 ./build.py --build-dir "$RUNNER_TEMP/b_mir2x_linux" --c-compiler gcc-16 --cxx-compiler g++-16 --parallel 4

      - name: Verify Linux linkage
        run: |
          set -euo pipefail

          install_dir="$RUNNER_TEMP/b_mir2x_linux/install"
          mapfile -t exe_list < <(find "$install_dir" -type f -perm -111 | sort)

          if [ "${#exe_list[@]}" -eq 0 ]; then
            echo "No installed executables found" >&2
            exit 1
          fi

          for exe in "${exe_list[@]}"; do
            if ! file "$exe" | grep -q 'ELF'; then
              continue
            fi

            echo "== ldd $exe =="
            ldd "$exe" || true

            echo "== readelf $exe =="
            readelf -d "$exe" | grep NEEDED || true
          done

      - name: Upload Linux install tree
        uses: actions/upload-artifact@v4
        with:
          name: mir2x-native-linux
          path: ${{ runner.temp }}/b_mir2x_linux/install
          if-no-files-found: error

  mingw-ucrt64:
    name: MinGW UCRT64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg
          key: mingw-ucrt64-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'ports/**') }}
          restore-keys: |
            mingw-ucrt64-vcpkg-

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-python

      - name: Build and install
        env:
          VCPKG_DEFAULT_TRIPLET: x64-mingw-static
          VCPKG_DEFAULT_HOST_TRIPLET: x64-mingw-static
        run: |
          python3 ./build.py --build-dir "$RUNNER_TEMP/b_mir2x_windows" --parallel 4

      - name: Verify MinGW linkage
        run: |
          set -euo pipefail

          install_dir="$RUNNER_TEMP/b_mir2x_windows/install"
          mapfile -t exe_list < <(find "$install_dir" -type f -name '*.exe' | sort)

          if [ "${#exe_list[@]}" -eq 0 ]; then
            echo "No installed executables found" >&2
            exit 1
          fi

          for exe in "${exe_list[@]}"; do
            echo "== ldd $exe =="
            ldd "$exe" || true

            echo "== objdump $exe =="
            objdump -p "$exe" | grep 'DLL Name' || true
          done

      - name: Upload MinGW install tree
        uses: actions/upload-artifact@v4
        with:
          name: mir2x-mingw-ucrt64
          path: ${{ runner.temp }}/b_mir2x_windows/install
          if-no-files-found: error
